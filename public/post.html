<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article | Project LIKHA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a href="/" class="brand" aria-label="Project LIKHA home">
        <span class="brand-mark">L</span>
        <span><strong>Project LIKHA</strong></span>
      </a>
      <div class="nav-menu sub-nav">
        <a href="/">Home</a>
        <a href="/news.html">News</a>
        <a href="/#about">About</a>
        <a href="/#help">Take Action</a>
        <span id="authNav" class="auth-slot"></span>
      </div>
    </nav>
  </header>

  <main id="main" class="article-page">
    <a href="/news.html" class="back-link">← Back to News</a>

    <article class="article" id="article">
      <p class="loading">Loading article…</p>
    </article>

    <section class="comments" id="commentsSection" hidden>
      <h2>Comments</h2>

      <div id="commentForm" class="comment-form hidden">
        <textarea id="commentInput" placeholder="Share an encouraging word…" rows="3"></textarea>
        <div class="comment-error hidden" id="commentError" role="alert"></div>
        <button class="button button-donate" type="button" id="commentSubmit">Post comment</button>
      </div>
      <p id="commentSignin" class="comment-signin hidden">
        <a href="/login.html">Sign in</a> to join the conversation.
      </p>

      <div id="commentsList" class="comments-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">
      <span>© Project LIKHA</span>
      <span>"Created in Christ Jesus to do good works." — Eph. 2:10</span>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
